services:
  db:
    image: postgres:16-alpine
    container_name: tuparking-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tuparking}
      POSTGRES_USER: ${POSTGRES_USER:-tuparking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tuparking}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tuparking} -d ${POSTGRES_DB:-tuparking}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tuparking-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://tuparking:tuparking@db:5432/tuparking}
      PORT: ${BACKEND_PORT:-5000}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./ML:/app/ML
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tuparking-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://backend:5000}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-.ngrok-free.dev}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
